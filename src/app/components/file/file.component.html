@if (($file | async); as file) {
  <div preview>
    <img [src]="file" #fileImage>
  </div>
}
<form [formGroup]="form">
  <mat-form-field>
    <ngx-mat-file-input
      #fileInput
      formControlName="file"
      [accept]="accept"
      valuePlaceholder="Select image"
    ></ngx-mat-file-input>
    @if (!fileInput.empty) {
      <button
        mat-icon-button
        matSuffix
        (click)="fileInput.clear($event)"
        >
        <mat-icon>close</mat-icon>
      </button>
    }
    <mat-icon matSuffix>upload</mat-icon>
    @if (fileControl.getError('face'); as error) {
      <mat-error>{{error}}</mat-error>
    }
  </mat-form-field>
</form>
<app-options (submit)="onSubmit($event)"></app-options>
